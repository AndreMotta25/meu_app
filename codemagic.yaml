# codemagic.yaml — Configuração de CI/CD para Flutter
# Documentação: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_env # Grupo com variáveis de ambiente (criado no UI do Codemagic)
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Decodificar .env das variáveis de ambiente
        script: |
          echo "$ENV_FILE_BASE64" | base64 --decode > .env
      - name: Instalar dependências
        script: |
          flutter clean
          flutter pub get
      - name: Gerar código (freezed, riverpod_generator, json_serializable)
        script: |
          dart run build_runner build --delete-conflicting-outputs
      - name: Build Android (App Bundle)
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/apk/release/*.apk
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - laboremecanica@gmail.com
        notify:
          - on_build_success
          - on_build_failure
      # google_play:               # Descomente para publicar na Play Store
      #   credentials: $GPLAY_CREDENTIALS
      #   track: internal

  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_env
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Decodificar .env das variáveis de ambiente
        script: |
          echo "$ENV_FILE_BASE64" | base64 --decode > .env
      - name: Instalar dependências
        script: |
          flutter clean
          flutter pub get
      - name: Gerar código (freezed, riverpod_generator, json_serializable)
        script: |
          dart run build_runner build --delete-conflicting-outputs
      - name: Build iOS (IPA)
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - laboremecanica@gmail.com
        notify:
          - on_build_success
          - on_build_failure
      # app_store_connect:          # Descomente para publicar na App Store
